<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My personal corner of the internet">
  <title>My Space</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <a class="logo" href="#" aria-label="Home">M.</a>
    <nav>
      <a href="#work">Spaces</a>
      <a href="mailto:hello@example.com">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="orb-stage" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
        <div class="glass-orb"></div>
      </div>

      <div class="hero-copy">
        <p class="kicker">MY DIGITAL SPACE</p>
        <h1>Creating<br><span>curious things.</span></h1>
        <p class="intro">A personal doorway into everything I make.</p>
        <a class="scroll-link" href="#work">
          Explore spaces
          <span>&darr;</span>
        </a>
      </div>
    </section>

    <section class="work" id="work">
      <div class="section-title reveal">
        <p>SELECTED SPACES</p>
        <h2>My spaces</h2>
      </div>
      <div class="cards" id="cards"></div>
    </section>

    <section class="statement reveal">
      <p>More ideas are taking shape.</p>
      <h2>Stay curious.<br>Keep creating.</h2>
      <a href="mailto:hello@example.com">Say hello <span>&nearr;</span></a>
    </section>
  </main>

  <footer>
    <span>&copy; <span id="year"></span></span>
    <span>MADE WITH CURIOSITY</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
